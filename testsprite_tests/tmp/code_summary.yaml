version: "2"
type: frontend
tech_stack:
  - next.js 15
  - react 19
  - typescript
  - css modules
routes:
  - path: /
    file: src/app/page.tsx
    auth_required: false
    description: Login page with 4-digit PIN
  - path: /dashboard
    file: src/app/(auth)/dashboard/page.tsx
    auth_required: true
    description: Admin dashboard with 3 tabs (Action Center, Deliveries, Materials)
  - path: /manager
    file: src/app/(auth)/manager/page.tsx
    auth_required: true
    description: Manager dashboard (Read-Only)
  - path: /unloader
    file: src/app/(auth)/unloader/page.tsx
    auth_required: true
    description: Unloader gamified home and delivery input
  - path: /delivery/[id]
    file: src/app/(auth)/delivery/[id]/page.tsx
    auth_required: true
    description: Detailed view of a single delivery with photos and export
features:
  - name: User Login
    description: Login with 4-digit PIN
    files:
      - src/app/page.tsx
    entry_route: /
    user_interactions:
      - Enter 4-digit PIN
      - Click Sign In button
      - See error shake animation on invalid PIN
    api_calls:
      - method: POST
        endpoint: /api/auth/login
  - name: Admin Dashboard - Tabs
    description: Switch between dashboard tabs
    files:
      - src/app/(auth)/dashboard/DashboardClient.tsx
    entry_route: /dashboard
    user_interactions:
      - Click on Action Center tab
      - Click on Deliveries tab
      - Click on Materials tab
  - name: Admin Dashboard - Missing Docs
    description: Resolve missing documents optimistically
    files:
      - src/components/dashboard/MissingDocsTracker.tsx
    entry_route: /dashboard
    user_interactions:
      - Click Resolve button on a missing document
      - See item disappear immediately (optimistic UI)
    api_calls:
      - method: POST
        endpoint: /api/dashboard/resolve-doc
  - name: Admin Dashboard - AI Chat
    description: Chat with AI assistant
    files:
      - src/components/dashboard/AIChatPanel.tsx
    entry_route: /dashboard
    user_interactions:
      - Click AI chat toggle button
      - Type message into input
      - Click Send button
    api_calls:
      - method: POST
        endpoint: /api/ai/chat
  - name: Unloader Home
    description: Gamified Unloader home screen
    files:
      - src/app/(auth)/unloader/UnloaderHomeClient.tsx
    entry_route: /unloader
    user_interactions:
      - View progress bar and stats
      - Click "Log New Delivery" button to open stepper
  - name: Delivery Detail
    description: View and export delivery details
    files:
      - src/app/(auth)/delivery/[id]/DeliveryDetailClient.tsx
    entry_route: /delivery/[id]
    user_interactions:
      - View AI summary, photos, and materials
      - Click on a photo to expand it
      - Click Export Delivery to download ZIP
    api_calls:
      - method: GET
        endpoint: /api/deliveries/[id]
      - method: POST
        endpoint: /api/deliveries/export
known_limitations: []
